name: Continuous Deployment

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Publish Web-Application
    runs-on: ubuntu-latest
    steps:
      - name: Starting X Virtual Frame Buffer (Port 99)
        run: |
          #sudo apt-get update
          #sudo apt-get install -y libxkbfile-dev pkg-config libsecret-1-dev libxss1 dbus xvfb libgtk-3-0 libgconf-2-4
          sudo /usr/bin/Xvfb -ac :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          # remove all running jobs (e.g. xvfb) from the job table of this bash process
          disown -ar
      - name: Checkout ${{ github.repository }} @ ${{ github.ref }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.x
      - name: Install NPM Packages
        run: npm install
      - name: Code Inspection
        run: npm run check
      - name: Unit & Component Tests
        run: npm run test
      - name: Build Web-Application
        run: npm run build --workspace=web
      - name: End-To-End Smoke Tests
        env:
          DISPLAY: ':99'
        run: |
            npm run build --workspace=app/electron
            export DBUS_SESSION_BUS_ADDRESS=/dev/null
            npx vitest run --reporter=dot --config=test/vitest.e2e.js "Frontend" --testNamePattern="SmokeTests"
      - name: Deploy App to CloudFlare
        uses: cloudflare/wrangler-action@v3
        env:
          WRANGLER_SEND_METRICS: false
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: 4
          command: deploy --assets=./web/build --name=hakuneko-app --latest=true
      - name: Build Documentation
        run: npm run build --workspace=docs
      - name: Deploy Docs to CloudFlare
        uses: cloudflare/wrangler-action@v3
        env:
          WRANGLER_SEND_METRICS: false
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: 4
          command: deploy --assets=./docs/.vitepress/dist --name=hakuneko-docs --latest=true